name: Planning Poker E2E CI

on:
  push:
    branches:
      - main
    paths:
      - '**'
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
    paths:
      - '**'
      - '!.github/**'
      - '!.gitignore'
      - '!.golangci.yaml'
      - '!.vscode/**'
      - '!.vscode.example/**'
      - '!AGENTS.md'
      - '!README.MD'
      - '!example.env'
      - '!requests.http'
      - '!sonar-project.properties'
      - '!helm/**'
      - '!docker-compose.yml'

jobs:
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Run E2E Tests
        env:
          E2E_READY_MAX_RETRIES: 120
        run: make e2e-ci

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: planning-poker-playwright-report
          path: frontend/planning-poker-front/playwright-report
          if-no-files-found: ignore

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: planning-poker-test-results
          path: frontend/planning-poker-front/test-results
          if-no-files-found: ignore
